<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ether Language v0.3</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #fff; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; max-width: 600px; }
        button { background: #007acc; color: #fff; border: none; padding: 12px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #005999; }
        pre { background: #111; padding: 15px; border-radius: 6px; color: #4ec9b0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Ether Language v0.3</h1>
        <p></p>
        <button onclick="testerEther()">Lancer la VM .eth</button>

        <h3>Résultat de la VM :</h3>
        <pre id="output">Appuie sur le bouton pour exécuter le script...</pre>
    </div>

    <script src="compiler.js"></script>
    <script src="vm.js"></script>
    
    <script>
        function testerEther() {
            
            const scriptEther = `
                
                MOV CNT, 0        ; Compteur = 0
                MOV ACC, 0        ; Total = 0

               
                boucle:
                ADD ACC, 20       ; Ajoute 20 à ACC à chaque tour
                INC CNT           ; Incremente CNT de 1

                CMP CNT, 5        ; Est-ce qu'on a fait 5 tours ?
                JNE boucle        ; Si CNT != 5, on re-boucle !

                
                STORE [0], ACC
                
                
                LOAD VAL, [0]
                SUB VAL, 15       ; 100 - 15 = 85
            `;
            
            
            const program = compileEther(scriptEther);
            
            
            const vm = new EtherVM();
            const state = vm.run(program);

            
            document.getElementById('output').textContent = JSON.stringify(state, null, 2);
        }
    </script>
</body>
</html>
